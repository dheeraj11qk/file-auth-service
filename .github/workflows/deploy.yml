name: Deploy Auth Service

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REGISTRY: 172786533719.dkr.ecr.eu-north-1.amazonaws.com
      IMAGE_NAME: auth-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Configure AWS for GitHub runner
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Login to ECR (for GitHub runner)
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $ECR_REGISTRY

      # Build and Push image
      - name: Build and Push Docker Image
        run: |
          docker buildx build --platform linux/amd64 \
          -t $ECR_REGISTRY/$IMAGE_NAME:latest \
          --push .

      # Deploy on EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR on EC2 (token expires every 12h)
            aws ecr get-login-password --region eu-north-1 | \
            docker login --username AWS --password-stdin 172786533719.dkr.ecr.eu-north-1.amazonaws.com

            # Pull latest image
            docker pull 172786533719.dkr.ecr.eu-north-1.amazonaws.com/auth-service:latest

            # Restart container
            docker-compose down
            docker-compose up -d
